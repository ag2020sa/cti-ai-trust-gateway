name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTI_GATEWAY_ENABLE_EXTERNAL_LLM: "false"

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality and tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy src
      - run: python -m bandit -q -c pyproject.toml -r src
      - name: Audit installed dependencies
        run: python -m pip_audit --local
      - name: Independent adversarial suite
        run: python -m pytest tests/adversarial -q
      - name: Full tests and branch coverage gate
        run: python -m pytest --cov --cov-branch --cov-report=term --cov-fail-under=80

  package:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install "build>=1.2,<2" "twine>=6,<7"
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install wheel in an isolated environment and test outside source tree
        shell: bash
        run: |
          wheel="$(realpath dist/*.whl)"
          python -m venv "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/python" -m pip install "$wheel"
          cp scripts/verify_release_install.py "$RUNNER_TEMP/verify_release_install.py"
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/wheel-venv/bin/python" verify_release_install.py
          "$RUNNER_TEMP/wheel-venv/bin/cti-trust" --help
          CTI_GATEWAY_DATABASE_URL="sqlite:///$RUNNER_TEMP/demo.db" \
            "$RUNNER_TEMP/wheel-venv/bin/cti-trust" demo

  docker:
    name: Docker build and health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker build --tag cti-ai-trust-gateway:0.1.0b2 .
      - name: Start container and verify health endpoint
        shell: bash
        run: |
          container="$(docker run --detach --name cti-gateway-ci \
            --publish 127.0.0.1:18000:8000 \
            --env CTI_GATEWAY_ENABLE_EXTERNAL_LLM=false \
            cti-ai-trust-gateway:0.1.0b2)"
          cleanup() { docker rm --force "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18000/health; then
              docker stop --time 10 "$container"
              exit 0
            fi
            sleep 1
          done
          docker logs "$container"
          exit 1
